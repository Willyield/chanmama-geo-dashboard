<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>蝉妈妈 GEO 采样仪表盘</title>
  <script src="./dashboard-data.js"></script>
  <style>
    :root {
      --surface: #f8fafc;
      --panel: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #cbd5e1;
      --line-soft: #e2e8f0;
      --blue: #1e40af;
      --blue-soft: #dbeafe;
      --amber: #d97706;
      --green: #047857;
      --red: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--surface);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Inter", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }
    .app { min-height: 100vh; }
    header {
      border-bottom: 1px solid var(--line);
      background: #0f172a;
      color: #f8fafc;
      padding: 22px 28px 18px;
    }
    .tick-rule {
      height: 12px;
      margin-bottom: 18px;
      background: repeating-linear-gradient(90deg, rgba(248,250,252,.75) 0 1px, transparent 1px 24px);
      opacity: .6;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 56px);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0;
    }
    .subtitle {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 13px;
    }
    main { padding: 24px 28px 40px; }
    .filters {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    select, input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
    }
    .executive-brief {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      border: 1px solid #1e293b;
      border-radius: 8px;
      background: #111827;
      color: #f8fafc;
      padding: 18px 20px;
      margin-bottom: 12px;
    }
    .brief-kicker {
      color: #93c5fd;
      font-size: 12px;
      font-weight: 850;
    }
    .brief-title {
      margin-top: 8px;
      font-size: clamp(20px, 2.5vw, 32px);
      line-height: 1.18;
      font-weight: 900;
    }
    .brief-note {
      margin-top: 8px;
      color: #cbd5e1;
      line-height: 1.5;
    }
    .brief-status {
      display: grid;
      justify-items: end;
      gap: 8px;
      min-width: 180px;
      font-variant-numeric: tabular-nums;
    }
    .brief-status strong {
      font-size: 30px;
      line-height: 1;
    }
    .brief-status span {
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 750;
    }
    .executive-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .overview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 10px;
    }
    .exec-card {
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 12px;
      min-height: 226px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
    }
    .exec-card.risk { border-top: 4px solid var(--red); }
    .exec-card.warn { border-top: 4px solid var(--amber); }
    .exec-card.ok { border-top: 4px solid var(--green); }
    .exec-card.muted { border-top: 4px solid var(--muted); }
    .exec-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .exec-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .status-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .status-chip.ok { background: #dcfce7; color: var(--green); }
    .status-chip.warn { background: #fef3c7; color: #92400e; }
    .status-chip.risk { background: #fee2e2; color: var(--red); }
    .status-chip.muted { background: #e2e8f0; color: #475569; }
    .exec-main {
      font-variant-numeric: tabular-nums;
      font-size: 32px;
      line-height: 1.05;
      font-weight: 850;
    }
    .exec-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .evidence-list {
      display: grid;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: #334155;
      font-size: 12px;
    }
    .evidence-list li {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 6px;
    }
    .evidence-list strong {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    .exec-readout {
      color: #334155;
      line-height: 1.5;
      font-weight: 700;
    }
    .exec-next {
      border-top: 1px solid var(--line-soft);
      padding-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .action-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 2fr;
      gap: 16px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      margin-bottom: 20px;
    }
    .action-panel h2 {
      font-size: 16px;
    }
    .action-copy {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
    }
    .action-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .action-list li {
      border: 1px solid var(--line-soft);
      border-radius: 6px;
      padding: 10px 12px;
      background: #f8fafc;
      color: #334155;
      font-weight: 750;
    }
    .metric-guide {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      margin-bottom: 20px;
    }
    .metric-guide-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .metric-guide-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .metric-guide-item {
      border: 1px solid var(--line-soft);
      border-radius: 6px;
      background: #f8fafc;
      padding: 10px 12px;
    }
    .metric-guide-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
    }
    .metric-guide-item span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .chart-card {
      min-height: 260px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .chart-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }
    .donut-row {
      display: grid;
      grid-template-columns: 164px minmax(0, 1fr);
      align-items: center;
      gap: 16px;
      min-height: 178px;
    }
    .donut {
      position: relative;
      width: 156px;
      height: 156px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: #e2e8f0;
    }
    .donut::after {
      content: "";
      position: absolute;
      inset: 34px;
      border-radius: 50%;
      background: var(--panel);
      border: 1px solid var(--line-soft);
    }
    .donut-center {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      place-content: center;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 850;
    }
    .donut-center small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .legend {
      display: grid;
      gap: 8px;
      color: #334155;
      font-size: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-variant-numeric: tabular-nums;
    }
    .legend-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex: 0 0 auto;
    }
    .bar-list {
      display: grid;
      gap: 10px;
      min-height: 178px;
      align-content: center;
    }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(92px, 132px) minmax(0, 1fr) 56px;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }
    .bar-label {
      color: #334155;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar-track {
      height: 10px;
      border: 1px solid var(--line-soft);
      background: #f1f5f9;
    }
    .bar-fill {
      height: 100%;
      min-width: 2px;
      background: var(--blue);
    }
    .bar-value {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .chart-note {
      color: var(--muted);
      font-size: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
    }
    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f1f5f9;
    }
    h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 850;
    }
    .table-wrap { overflow: auto; max-height: 560px; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      border-bottom: 1px solid var(--line-soft);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #e2e8f0;
      color: #334155;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    td { line-height: 1.45; }
    .num { font-variant-numeric: tabular-nums; white-space: nowrap; }
    .help {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      white-space: normal;
    }
    .decision-list {
      display: grid;
      gap: 12px;
      padding: 14px;
      max-height: 680px;
      overflow: auto;
    }
    .decision-card {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #ffffff;
      padding: 14px;
    }
    .decision-card-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }
    .decision-question {
      margin-top: 8px;
      color: var(--ink);
      font-size: 16px;
      font-weight: 850;
      line-height: 1.45;
    }
    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }
    .decision-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 12px;
      align-items: stretch;
    }
    .mini-panel {
      border: 1px solid var(--line-soft);
      border-radius: 6px;
      background: #f8fafc;
      padding: 10px;
    }
    .mini-panel h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .mini-rows {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .mini-rows li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #334155;
      font-size: 12px;
    }
    .mini-rows strong {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    .score-main {
      font-size: 24px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }
    .score-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .decision-reason {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }
    .pill.ok { border-color: #86efac; background: #dcfce7; color: var(--green); }
    .pill.warn { border-color: #fcd34d; background: #fef3c7; color: #92400e; }
    .question { min-width: 360px; }
    .empty { color: var(--muted); }
    @media (max-width: 980px) {
      header, main { padding-left: 16px; padding-right: 16px; }
      .filters, .action-list, .metric-guide-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .executive-grid { grid-template-columns: 1fr; }
      .executive-brief, .action-panel { grid-template-columns: 1fr; }
      .decision-grid { grid-template-columns: 1fr; }
      .brief-status { justify-items: start; }
      .chart-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .filters, .executive-grid, .action-list, .metric-guide-grid { grid-template-columns: 1fr; }
      .decision-card-head { grid-template-columns: 1fr; }
      .donut-row { grid-template-columns: 1fr; justify-items: center; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="tick-rule"></div>
      <h1>蝉妈妈 GEO <span id="scopeTitle">仪表盘</span></h1>
      <div class="subtitle">
        <span>入口：爱搜 GEO / 豆包 / 网页 / 快速</span>
        <span>运营圈：<span id="sourceUrl"></span></span>
        <span>更新：<span id="updatedAt"></span></span>
      </div>
    </header>
    <main>
      <div class="filters">
        <label>优先级<select id="priorityFilter"></select></label>
        <label>分类<select id="categoryFilter"></select></label>
        <label>关键词<select id="keywordFilter"></select></label>
        <label>提及状态<select id="mentionFilter">
          <option value="all">全部</option>
          <option value="mentioned">已提及</option>
          <option value="not-mentioned">未提及</option>
        </select></label>
        <label>搜索<input id="searchInput" type="search" placeholder="问题或关键词"></label>
      </div>

      <div class="executive-brief" id="executiveBrief"></div>
      <div class="executive-grid" id="kpis"></div>
      <section class="action-panel" id="actionPanel"></section>
      <section class="metric-guide" id="metricGuide"></section>
      <div class="overview-head">
        <h2>图表与明细</h2>
        <span class="pill">支持下钻核对</span>
      </div>
      <div class="chart-grid" id="chartGrid"></div>

      <div class="grid">
        <section>
          <div class="section-head"><h2>核心问题周度判定</h2><span class="pill" id="decisionCount"></span></div>
          <div class="decision-list" id="decisionTable"></div>
        </section>
        <section>
          <div class="section-head"><h2>分类维度</h2><span class="pill" id="categoryCount"></span></div>
          <div class="table-wrap"><table id="categoryTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>关键词维度</h2><span class="pill" id="keywordCount"></span></div>
          <div class="table-wrap"><table id="keywordTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>问题维度</h2><span class="pill" id="questionCount"></span></div>
          <div class="table-wrap"><table id="questionTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>单次采样记录</h2><span class="pill" id="sampleCount"></span></div>
          <div class="table-wrap"><table id="sampleTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>GEO 内容修复清单</h2><span class="pill" id="taskCount"></span></div>
          <div class="table-wrap"><table id="taskTable"></table></div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const state = { priority: 'all', category: 'all', keyword: 'all', mention: 'all', search: '' };
    const rows = window.GEO_DASHBOARD.summary;
    const samples = window.GEO_DASHBOARD.samples;
    const questions = window.GEO_DASHBOARD.questions;
    const tasks = window.GEO_DASHBOARD.content_tasks || [];
    const repairList = window.GEO_DASHBOARD.content_repair_list || tasks;
    const questionDecisions = window.GEO_DASHBOARD.question_decisions || [];
    const keywordDecisions = window.GEO_DASHBOARD.keyword_decisions || [];

    const $ = (id) => document.getElementById(id);
    const uniq = (items) => [...new Set(items.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
    const asNum = (value) => Number.parseInt(value || '0', 10) || 0;
    const percent = (n, d) => d > 0 ? `${Math.round(n * 100 / d)}%` : '0%';
    const rankText = (sum, count) => count > 0 ? (sum / count).toFixed(1).replace(/\.0$/, '') : '未进入排名';

    function optionList(select, values, allLabel) {
      select.innerHTML = `<option value="all">${allLabel}</option>` + values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
    }

    function filteredSummary() {
      const query = state.search.trim().toLowerCase();
      return rows.filter(row => {
        if (state.priority !== 'all' && row.priority !== state.priority) return false;
        if (state.category !== 'all' && row.category !== state.category) return false;
        if (state.keyword !== 'all' && row.keyword !== state.keyword) return false;
        if (state.mention === 'mentioned' && asNum(row.mention_count) === 0) return false;
        if (state.mention === 'not-mentioned' && asNum(row.mention_count) > 0) return false;
        if (query && !`${row.keyword} ${row.question_text}`.toLowerCase().includes(query)) return false;
        return true;
      });
    }

    function aggregate(items, key) {
      const map = new Map();
      items.forEach(row => {
        const name = row[key];
        const item = map.get(name) || {
          name, questions: 0, planned: 0, completed: 0, mentions: 0, firsts: 0, top3: 0,
          effectiveFirstDenominator: 0, officialFirstExcluded: 0,
          rankSum: 0, rankCount: 0, mindScoreSum: 0, mindScoreCount: 0,
          advantages: 0, competitors: 0, officialTools: 0,
          sources: 0, officialSources: 0, externalSources: 0
        };
        item.questions += 1;
        item.planned += asNum(row.planned_sample_count);
        item.completed += asNum(row.completed_sample_count);
        item.mentions += asNum(row.mention_count);
        item.firsts += asNum(row.first_recommendation_count);
        item.effectiveFirstDenominator += asNum(row.effective_first_recommendation_denominator);
        item.officialFirstExcluded += asNum(row.official_first_excluded_count);
        item.top3 += asNum(row.top3_chanmama_count);
        const rankCount = asNum(row.ranked_chanmama_count);
        const avgRank = Number.parseFloat(row.avg_chanmama_rank || '0');
        if (rankCount && avgRank) {
          item.rankSum += avgRank * rankCount;
          item.rankCount += rankCount;
        }
        item.mindScoreSum += asNum(row.mind_influence_score_sum);
        item.mindScoreCount += asNum(row.completed_sample_count);
        item.advantages += asNum(row.advantage_hit_count);
        item.competitors += asNum(row.competitor_mention_count);
        item.officialTools += asNum(row.official_tool_mention_count);
        item.sources += asNum(row.yunyingquan_source_count);
        item.officialSources += asNum(row.official_source_count);
        item.externalSources += asNum(row.external_source_count);
        map.set(name, item);
      });
      return [...map.values()].sort((a, b) => b.planned - a.planned || a.name.localeCompare(b.name, 'zh-CN'));
    }

    function renderTable(id, headers, bodyRows) {
      const table = $(id);
      table.innerHTML = `<thead><tr>${headers.map(h => `<th>${h.label}</th>`).join('')}</tr></thead><tbody>${
        bodyRows.map(row => `<tr>${headers.map(h => `<td class="${h.class || ''}">${h.render ? h.render(row) : escapeHtml(row[h.key])}</td>`).join('')}</tr>`).join('')
      }</tbody>`;
    }

    function metricGuideItem(name, desc) {
      return `<div class="metric-guide-item"><strong>${escapeHtml(name)}</strong><span>${escapeHtml(desc)}</span></div>`;
    }

    function renderMetricGuide() {
      $('metricGuide').innerHTML = `<div class="metric-guide-head">
        <h2>指标说明</h2>
        <span class="pill">把口径放在页面内，方便汇报时解释</span>
      </div>
      <div class="metric-guide-grid">
        ${[
          ['爱搜热度', '来自原始关键词表的流量字段，用来判断这个问题背后的搜索需求大小。'],
          ['提及率', '已采样回答里出现“蝉妈妈”的比例，代表品牌是否被 AI 看见。'],
          ['首推率', '已采样回答里把蝉妈妈放在第一推荐的比例，代表推荐优先级。'],
          ['有效首推率', '把抖音官方工具首推样本剔除后再看蝉妈妈首推率，避免被抖音电商罗盘、巨量千川、巨量引擎等官方工具压低判断。'],
          ['得分', '单次样本：首推 5 分，第 2 名 4 分，第 3 名 3 分，提及但非前三 2 分，未提及 0 分；每题 6 次满分 30 分，22 分视为达标。'],
          ['均排', '蝉妈妈进入推荐排名时的平均名次，数字越小越好；未进入排名的样本不参与均排计算。'],
          ['心智分', '首推 100，第二 85，第三 70，提及但非前三 50，未提及 0，用来衡量 AI 对品牌推荐强度。'],
          ['结果差异', '同一问题多次采样后的回答分布，拆成未提及、提及非首推、首推三类看稳定性。'],
          ['内容证据力', '看 AI 是否引用运营圈、官网或外站内容；只会说优势但没有引用，说明可被引用的内容还不够。']
        ].map(([name, desc]) => metricGuideItem(name, desc)).join('')}
      </div>`;
    }

    function resultBreakdown(row) {
      const completed = asNum(row.batch_completed_count || row.completed_sample_count);
      const first = asNum(row.first_recommendation_count);
      const mentions = asNum(row.mention_count);
      const mentionOnly = Math.max(mentions - first, 0);
      const notMentioned = Math.max(completed - mentions, 0);
      return `<div class="mini-panel">
        <h3>结果差异</h3>
        <ul class="mini-rows">
          <li><span>未提及</span><strong>${notMentioned} 次</strong></li>
          <li><span>提及非首推</span><strong>${mentionOnly} 次</strong></li>
          <li><span>首推</span><strong>${first} 次</strong></li>
        </ul>
      </div>`;
    }

    function renderDecisionCards(id, bodyRows) {
      const target = $(id);
      target.innerHTML = bodyRows.map(row => {
        const score = row.batch_score || row.weekly_score || '0';
        const maxScore = row.batch_max_score || row.weekly_max_score || '30';
        const scoreRate = row.batch_score_rate || row.weekly_score_rate || '0%';
        const completed = `${row.batch_completed_count || 0}/${row.batch_target_count || row.weekly_target_count || 6}`;
        const heat = row.traffic || '暂无';
        return `<article class="decision-card">
          <div class="decision-card-head">
            <div>
              <div class="meta-line">
                <span>${escapeHtml(row.priority || '')}</span>
                <span>${escapeHtml(row.category || '')}</span>
                <span>${escapeHtml(row.keyword || '')}</span>
                <span>爱搜热度 ${escapeHtml(heat)}</span>
              </div>
              <div class="decision-question">${escapeHtml(row.question_text || '')}</div>
            </div>
            <div>${pill(row.codex_question_decision)}</div>
          </div>
          <div class="decision-grid">
            <div class="mini-panel">
              <h3>采样与得分</h3>
              <div class="score-main">${escapeHtml(score)}/${escapeHtml(maxScore)} <span class="help">${escapeHtml(scoreRate)}</span></div>
              <div class="score-note">首推5分，第2名4分，第3名3分，提及2分，未提及0分；22分达标。</div>
              <ul class="mini-rows">
                <li><span>本次累计</span><strong>${escapeHtml(completed)}</strong></li>
                <li><span>本周新增</span><strong>${escapeHtml(row.weekly_completed_count || 0)}/${escapeHtml(row.weekly_target_count || 6)}</strong></li>
              </ul>
            </div>
            ${resultBreakdown(row)}
            <div class="mini-panel">
              <h3>后续动作</h3>
              <ul class="mini-rows">
                <li><span>继续问</span><strong>${escapeHtml(row.continue_sampling || '待定')}</strong></li>
                <li><span>后续频率</span><strong>${escapeHtml(row.next_check_frequency || '')}</strong></li>
              </ul>
              <div class="decision-reason">${escapeHtml(row.decision_reason || '')}</div>
            </div>
          </div>
        </article>`;
      }).join('');
    }

    const chartColors = ['#1e40af', '#d97706', '#047857', '#7c3aed', '#0f766e', '#b91c1c', '#64748b', '#0ea5e9'];

    function chartCard(title, body, note = '') {
      return `<section class="chart-card">
        <div class="section-head"><h2>${escapeHtml(title)}</h2>${note ? `<span class="pill">${escapeHtml(note)}</span>` : ''}</div>
        <div class="chart-body">${body}</div>
      </section>`;
    }

    function donutChart(title, segments, center, note) {
      const total = segments.reduce((sum, item) => sum + Math.max(0, item.value), 0);
      let cursor = 0;
      const stops = total > 0 ? segments.map((item, index) => {
        const start = cursor;
        const end = cursor + item.value * 100 / total;
        cursor = end;
        return `${item.color || chartColors[index % chartColors.length]} ${start.toFixed(2)}% ${end.toFixed(2)}%`;
      }).join(', ') : '#e2e8f0 0% 100%';
      const legend = segments.map((item, index) => `<div class="legend-item">
        <span class="legend-name"><span class="swatch" style="background:${item.color || chartColors[index % chartColors.length]}"></span>${escapeHtml(item.name)}</span>
        <strong>${escapeHtml(item.label ?? String(item.value))}</strong>
      </div>`).join('');
      return chartCard(title, `<div class="donut-row">
        <div class="donut" style="background: conic-gradient(${stops});"><div class="donut-center">${center}<small>${escapeHtml(note)}</small></div></div>
        <div class="legend">${legend}</div>
      </div>`);
    }

    function barChart(title, items, note = '') {
      const max = Math.max(...items.map(item => item.value), 1);
      const bars = items.map((item, index) => {
        const width = Math.max(1, Math.round(item.value * 100 / max));
        const color = item.color || chartColors[index % chartColors.length];
        return `<div class="bar-row">
          <div class="bar-label" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${width}%;background:${color}"></div></div>
          <div class="bar-value">${escapeHtml(item.label ?? String(item.value))}</div>
        </div>`;
      }).join('');
      return chartCard(title, `<div class="bar-list">${bars}</div>${note ? `<div class="chart-note">${escapeHtml(note)}</div>` : ''}`);
    }

    const pctNumber = (n, d) => d > 0 ? Math.round(n * 100 / d) : 0;

    function confidenceState(completed, planned) {
      const rate = planned > 0 ? completed / planned : 0;
      if (completed < 30 || rate < 0.1) return { label: '早期观察', tone: 'muted', note: '样本不足，仅作早期信号' };
      if (completed < 100 || rate < 0.35) return { label: '待验证', tone: 'warn', note: '已有方向，但仍需继续采样' };
      if (completed < 300 || rate < 0.75) return { label: '可判断', tone: 'ok', note: '可以用于阶段判断' };
      return { label: '稳定判断', tone: 'ok', note: '样本覆盖较充分' };
    }

    function brandState(avgMindScore, effectiveFirstRate) {
      const score = Number.parseFloat(avgMindScore || '0');
      if (!score) return { label: '暂无数据', tone: 'muted', note: '还没有足够样本判断品牌推荐力' };
      if (score >= 80 && effectiveFirstRate >= 50) return { label: '强', tone: 'ok', note: '推荐力较强，已接近稳定首推' };
      if (score >= 55) return { label: '中等', tone: 'warn', note: '推荐力中等，仍未形成稳定首推' };
      return { label: '偏弱', tone: 'risk', note: '推荐力偏弱，需要优先补内容证据' };
    }

    function evidenceState(advantages, completed, sourceTotal) {
      const advantageRate = pctNumber(advantages, completed);
      if (!completed) return { label: '暂无数据', tone: 'muted', note: '还没有样本判断内容证据力' };
      if (sourceTotal === 0) return { label: '弱', tone: 'risk', note: 'AI 能讲优势，但没有引用我方内容' };
      if (advantageRate >= 60) return { label: '可加强', tone: 'warn', note: '已有优势表达，引用源仍需扩大' };
      return { label: '弱', tone: 'risk', note: '优势表达和引用源都需要补强' };
    }

    function riskState(officialTools, competitors, completed) {
      const officialRate = pctNumber(officialTools, completed);
      const competitorRate = pctNumber(competitors, completed);
      if (!completed) return { label: '待判断', tone: 'muted', note: '还没有样本判断压制来源' };
      if (officialRate >= 50 && officialRate >= competitorRate) {
        return { label: '官方工具压制', tone: 'warn', note: '主要不是竞品压制，而是抖音官方工具占位' };
      }
      if (competitorRate >= 30) return { label: '竞品压制', tone: 'risk', note: '竞品出现频率较高，需要反查引用源' };
      return { label: '暂未显著', tone: 'ok', note: '暂未看到明显竞品或官方工具压制' };
    }

    function evidenceRows(rows) {
      return `<ul class="evidence-list">${rows.map(([label, value]) => `<li><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></li>`).join('')}</ul>`;
    }

    function executiveCard(title, state, main, sub, rows, readout, next) {
      return `<article class="exec-card ${state.tone}">
        <div class="exec-top"><div class="exec-title">${escapeHtml(title)}</div><span class="status-chip ${state.tone}">${escapeHtml(state.label)}</span></div>
        <div>
          <div class="exec-main">${escapeHtml(main)}</div>
          <div class="exec-sub">${escapeHtml(sub)}</div>
        </div>
        ${evidenceRows(rows)}
        <div class="exec-readout">${escapeHtml(readout)}</div>
        <div class="exec-next">${escapeHtml(next)}</div>
      </article>`;
    }

    function renderExecutiveOverview(metrics) {
      const completeRate = percent(metrics.completed, metrics.planned);
      const effectiveFirstRate = pctNumber(metrics.firsts, metrics.effectiveFirstDenominator);
      const mentionRate = percent(metrics.mentions, metrics.completed);
      const firstRate = percent(metrics.firsts, metrics.completed);
      const top3Rate = percent(metrics.top3, metrics.completed);
      const advantageRate = percent(metrics.advantages, metrics.completed);
      const sourceTotal = metrics.sources + metrics.officialSources + metrics.externalSources;
      const confidence = confidenceState(metrics.completed, metrics.planned);
      const brand = brandState(metrics.avgMindScore, effectiveFirstRate);
      const evidence = evidenceState(metrics.advantages, metrics.completed, sourceTotal);
      const risk = riskState(metrics.officialTools, metrics.competitors, metrics.completed);
      const summaryPrefix = confidence.label === '早期观察' ? '早期信号' : '阶段判断';
      const sourceProblem = sourceTotal === 0 ? '引用源缺失' : '引用源不足';
      const riskAction = risk.label === '竞品压制'
        ? '下一步：反查竞品引用源，补同类证据和第三方测评对比页。'
        : '下一步：优先做官方后台 vs 第三方数据工具的客观对比页。';

      $('executiveBrief').innerHTML = `<div>
        <div class="brief-kicker">总结 / ${escapeHtml(window.GEO_DASHBOARD.meta.scope_label || '')}</div>
        <div class="brief-title">${summaryPrefix}：蝉妈妈有可见度，但样本仍少；当前主要问题是${risk.label}与${sourceProblem}。</div>
        <div class="brief-note">默认先看结论、风险和动作；复杂口径保留在下方图表与明细表中，便于复核。</div>
      </div>
      <div class="brief-status">
        <span>GEO 健康度</span>
        <strong>${escapeHtml(confidence.label)}</strong>
        <span>${metrics.completed}/${metrics.planned}，完成率 ${completeRate}</span>
      </div>`;

      $('kpis').innerHTML = [
        executiveCard('样本可信度', confidence, `${metrics.completed}/${metrics.planned}`, `完成率 ${completeRate}`, [
          ['问题数', `${metrics.questionCount} 个`],
          ['核心问题达标', `${metrics.passedQuestions} 个`],
          ['关键词达标', `${metrics.passedKeywords} 个`],
          ['周环比', '待积累']
        ], confidence.note, confidence.label === '早期观察' ? '下一步：继续采样，避免过早下稳定结论。' : '下一步：进入周环比观察，确认趋势是否稳定。'),
        executiveCard('品牌推荐力', brand, `${metrics.avgMindScore}`, `${brand.note}`, [
          ['提及率', mentionRate],
          ['首推率', firstRate],
          ['有效首推率', `${effectiveFirstRate}%（剔除官方工具）`],
          ['前 3 率 / 均排', `${top3Rate} / ${rankText(metrics.rankSum, metrics.rankCount)}`]
        ], `蝉妈妈已被看见，但首推和稳定排序仍需继续拉升；均排越低代表推荐位置越靠前。`, '下一步：补“为什么选蝉妈妈”的对比型内容和 FAQ。'),
        executiveCard('内容证据力', evidence, evidence.label, evidence.note, [
          ['优势表达', `${metrics.advantages} 次，${advantageRate}`],
          ['运营圈引用', `${metrics.sources} 次，${percent(metrics.sources, metrics.completed)}`],
          ['官网引用', `${metrics.officialSources} 次，${percent(metrics.officialSources, metrics.completed)}`],
          ['外站引用', `${metrics.externalSources} 次，${percent(metrics.externalSources, metrics.completed)}`]
        ], sourceTotal === 0 ? 'AI 能复述优势，但没有把运营圈、官网或外站当作证据引用。' : '已有引用迹象，但证据覆盖还不够。', '下一步：补运营圈可引用内容、官网说明页和外站分发证据。'),
        executiveCard('压制风险', risk, risk.label, risk.note, [
          ['官方工具', `${metrics.officialTools} 次，${percent(metrics.officialTools, metrics.completed)}`],
          ['官方首推排除', `${metrics.officialFirstExcluded} 次`],
          ['竞品提及', `${metrics.competitors} 次，${percent(metrics.competitors, metrics.completed)}`],
          ['样本基数', `${metrics.completed} 次`]
        ], risk.note, riskAction)
      ].join('');

      $('actionPanel').innerHTML = `<div>
        <h2>下一步动作</h2>
        <div class="action-copy">优先把“可被 AI 引用的证据”补齐，解决${risk.label}和${sourceProblem}，而不是先扩展更多指标。</div>
      </div>
      <ul class="action-list">
        <li>官方后台 vs 第三方数据工具对比页</li>
        <li>运营圈可引用内容</li>
        <li>蝉妈妈优势 FAQ</li>
        <li>外站分发证据</li>
      </ul>`;
      renderMetricGuide();
    }

    function renderCharts(metrics) {
      const remaining = Math.max(metrics.planned - metrics.completed, 0);
      const categoryItems = aggregate(metrics.data, 'category')
        .filter(item => item.completed > 0)
        .slice(0, 8)
        .map(item => ({ name: item.name, value: item.completed, label: `${item.completed}` }));
      const decisionMap = new Map();
      metrics.decisionRows.forEach(row => {
        const name = row.codex_question_decision || '待判定';
        decisionMap.set(name, (decisionMap.get(name) || 0) + 1);
      });
      const decisionItems = [...decisionMap.entries()].map(([name, value]) => ({ name, value, label: `${value}` }));
      $('chartGrid').innerHTML = [
        donutChart('采样完成度', [
          { name: '已完成', value: metrics.completed, label: `${metrics.completed} 次`, color: '#1e40af' },
          { name: '待采样', value: remaining, label: `${remaining} 次`, color: '#cbd5e1' }
        ], percent(metrics.completed, metrics.planned), `${metrics.completed}/${metrics.planned}`),
        barChart('推荐表现', [
          { name: '蝉妈妈提及', value: metrics.mentions, label: percent(metrics.mentions, metrics.completed), color: '#1e40af' },
          { name: '蝉妈妈首推', value: metrics.firsts, label: percent(metrics.firsts, metrics.completed), color: '#047857' },
          { name: '有效首推', value: metrics.firsts, label: percent(metrics.firsts, metrics.effectiveFirstDenominator), color: '#16a34a' },
          { name: '前 3 推荐', value: metrics.top3, label: percent(metrics.top3, metrics.completed), color: '#0ea5e9' },
          { name: '优势表达', value: metrics.advantages, label: percent(metrics.advantages, metrics.completed), color: '#d97706' },
          { name: '竞品提及', value: metrics.competitors, label: percent(metrics.competitors, metrics.completed), color: '#b91c1c' },
          { name: '官方工具', value: metrics.officialTools, label: percent(metrics.officialTools, metrics.completed), color: '#7c3aed' },
          { name: '运营圈引用', value: metrics.sources, label: percent(metrics.sources, metrics.completed), color: '#0f766e' }
        ], `基于 ${metrics.completed} 次已采样结果`),
        barChart('分类采样分布', categoryItems.length ? categoryItems : [{ name: '暂无数据', value: 0, label: '0' }], '按已采样次数排序'),
        donutChart('问题判定分布', decisionItems.length ? decisionItems : [{ name: '待判定', value: 1, label: '0' }], `${decisionItems.reduce((sum, item) => sum + item.value, 0)} 个`, '核心问题')
      ].join('');
    }

    function render() {
      const data = filteredSummary();
      const planned = data.reduce((sum, row) => sum + asNum(row.planned_sample_count), 0);
      const completed = data.reduce((sum, row) => sum + asNum(row.completed_sample_count), 0);
      const mentions = data.reduce((sum, row) => sum + asNum(row.mention_count), 0);
      const firsts = data.reduce((sum, row) => sum + asNum(row.first_recommendation_count), 0);
      const effectiveFirstDenominator = data.reduce((sum, row) => sum + asNum(row.effective_first_recommendation_denominator), 0);
      const officialFirstExcluded = data.reduce((sum, row) => sum + asNum(row.official_first_excluded_count), 0);
      const top3 = data.reduce((sum, row) => sum + asNum(row.top3_chanmama_count), 0);
      const rankPairs = data.map(row => [Number.parseFloat(row.avg_chanmama_rank || '0'), asNum(row.ranked_chanmama_count)]).filter(([rank, count]) => rank && count);
      const rankSum = rankPairs.reduce((sum, [rank, count]) => sum + rank * count, 0);
      const rankCount = rankPairs.reduce((sum, [, count]) => sum + count, 0);
      const mindScoreSum = data.reduce((sum, row) => sum + asNum(row.mind_influence_score_sum), 0);
      const avgMindScore = completed > 0 ? (mindScoreSum / completed).toFixed(1).replace(/\.0$/, '') : '暂无';
      const advantages = data.reduce((sum, row) => sum + asNum(row.advantage_hit_count), 0);
      const competitors = data.reduce((sum, row) => sum + asNum(row.competitor_mention_count), 0);
      const officialTools = data.reduce((sum, row) => sum + asNum(row.official_tool_mention_count), 0);
      const sources = data.reduce((sum, row) => sum + asNum(row.yunyingquan_source_count), 0);
      const officialSources = data.reduce((sum, row) => sum + asNum(row.official_source_count), 0);
      const externalSources = data.reduce((sum, row) => sum + asNum(row.external_source_count), 0);
      const visibleKeywords = new Set(data.map(r => r.keyword));
      const visibleQuestionIds = new Set(data.map(r => r.question_id));
      const summaryByQuestionId = new Map(data.map(row => [row.question_id, row]));
      const decisionRows = questionDecisions
        .filter(row => visibleQuestionIds.has(row.question_id))
        .map(row => ({...(summaryByQuestionId.get(row.question_id) || {}), ...row}));
      const passedQuestions = decisionRows.filter(row => row.codex_question_decision === '达标').length;
      const continuingQuestions = decisionRows.filter(row => row.continue_sampling === '是').length;
      const keywordDecisionRows = keywordDecisions.filter(row => visibleKeywords.has(row.keyword));
      const passedKeywords = keywordDecisionRows.filter(row => row.codex_keyword_decision === '达标').length;

      const metrics = {
        data,
        questionCount: data.length,
        planned,
        completed,
        mentions,
        firsts,
        effectiveFirstDenominator,
        officialFirstExcluded,
        top3,
        rankSum,
        rankCount,
        avgMindScore,
        mindScoreSum,
        advantages,
        competitors,
        officialTools,
        sources,
        officialSources,
        externalSources,
        passedQuestions,
        continuingQuestions,
        passedKeywords,
        decisionRows
      };
      renderExecutiveOverview(metrics);
      renderCharts(metrics);

      $('decisionCount').textContent = `${decisionRows.length} 个核心问题`;
      renderDecisionCards('decisionTable', decisionRows);

      const categoryRows = aggregate(data, 'category');
      $('categoryCount').textContent = `${categoryRows.length} 类`;
      renderTable('categoryTable', metricHeaders('分类'), categoryRows);

      const keywordRows = aggregate(data, 'keyword');
      $('keywordCount').textContent = `${keywordRows.length} 个关键词`;
      renderTable('keywordTable', metricHeaders('关键词'), keywordRows);

      $('questionCount').textContent = `${data.length} 个问题`;
      renderTable('questionTable', [
        { label: '优先级', key: 'priority' },
        { label: '关键词', key: 'keyword' },
        { label: '爱搜热度<span class="help">原始流量，代表问题需求大小</span>', render: r => escapeHtml(r.traffic || '暂无'), class: 'num' },
        { label: '问题', key: 'question_text', class: 'question' },
        { label: '问题类型', render: r => escapeHtml(r.question_type || r.intent || '') },
        { label: '采样<span class="help">已采样 / 计划</span>', render: r => `${r.completed_sample_count}/${r.planned_sample_count}`, class: 'num' },
        { label: '提及 / 首推<span class="help">品牌可见度与第一推荐</span>', render: r => `${r.mention_count} 次，${r.mention_rate}<br>${r.first_recommendation_count} 次，${r.first_recommendation_rate}`, class: 'num' },
        { label: '有效首推<span class="help">剔除抖音官方工具首推</span>', render: r => `${r.effective_first_recommendation_count || 0}/${r.effective_first_recommendation_denominator || 0}<br>${r.effective_first_recommendation_rate || '0%'}`, class: 'num' },
        { label: '均排 / 心智分<span class="help">均排越低越好；心智分越高越好</span>', render: r => `${escapeHtml(r.avg_chanmama_rank || '未进入')}<br>${escapeHtml(r.avg_mind_influence_score || '暂无')}`, class: 'num' },
        { label: '引用证据<span class="help">运营圈 / 官网 / 外站</span>', render: r => `${r.yunyingquan_source_count}/${r.official_source_count}/${r.external_source_count}`, class: 'num' }
      ], data);

      const questionById = new Map(questions.map(q => [q.question_id, q]));
      const sampleRows = samples.filter(s => visibleQuestionIds.has(s.question_id)).map(s => ({...s, ...(questionById.get(s.question_id) || {})}));
      $('sampleCount').textContent = `${sampleRows.length} 条记录`;
      renderTable('sampleTable', [
        { label: '采样ID', key: 'sample_id' },
        { label: '问题ID', key: 'question_id' },
        { label: '轮次', key: 'sample_round', class: 'num' },
        { label: '采样节奏', key: 'sampling_cadence' },
        { label: '关键词', key: 'keyword' },
        { label: '问题类型', render: r => escapeHtml(r.question_type || r.intent || '') },
        { label: '问题', key: 'question_text', class: 'question' },
        { label: '日期', render: r => r.sample_date || '<span class="empty">待采集</span>' },
        { label: '提及蝉妈妈', render: r => pill(r.mentioned_chanmama) },
        { label: '首推', render: r => escapeHtml(r.first_recommendation || '待采集') },
        { label: '蝉妈妈首推', render: r => pill(r.chanmama_is_first) },
        { label: '排名<span class="help">蝉妈妈在推荐中的名次</span>', render: r => escapeHtml(r.chanmama_rank || '未进入'), class: 'num' },
        { label: '前 3', render: r => pill(r.top3_contains_chanmama) },
        { label: '得分<span class="help">首推5，第2名4，第3名3，提及2</span>', render: r => escapeHtml(r.geo_sample_score || ''), class: 'num' },
        { label: '心智分<span class="help">首推100，第二85，第三70</span>', render: r => escapeHtml(r.mind_influence_score || ''), class: 'num' },
        { label: '竞品', render: r => escapeHtml(r.mentioned_competitors || '') },
        { label: '官方工具', render: r => escapeHtml(r.mentioned_official_tools || '') },
        { label: '优势命中', render: r => escapeHtml(r.target_advantages_hit || '') },
        { label: '缺口', render: r => escapeHtml(r.content_gap_type || '') },
        { label: '建议动作', render: r => escapeHtml(r.suggested_action || '') },
        { label: '运营圈引用', render: r => pill(r.mentioned_yunyingquan_source) },
        { label: '引用源', render: r => escapeHtml(r.source_urls || '待采集') }
      ], sampleRows);

      const taskRows = repairList.filter(row => visibleQuestionIds.has(row.question_id));
      $('taskCount').textContent = `${taskRows.length} 条任务`;
      renderTable('taskTable', [
        { label: '修复ID', render: r => escapeHtml(r.repair_id || r.task_id || '') },
        { label: '修复优先级', render: r => escapeHtml(r.repair_priority || r.priority || '') },
        { label: '优先级', key: 'priority' },
        { label: '分类', key: 'category' },
        { label: '关键词', key: 'keyword' },
        { label: '问题', key: 'question_text', class: 'question' },
        { label: '影响样本', render: r => escapeHtml(r.affected_sample_count || '1'), class: 'num' },
        { label: '缺口类型', render: r => escapeHtml(r.content_gap_types || r.content_gap_type || '') },
        { label: '建议动作', render: r => escapeHtml(r.suggested_actions || r.suggested_action || '') },
        { label: '竞品', key: 'mentioned_competitors' },
        { label: '官方工具', key: 'mentioned_official_tools' },
        { label: '优势命中', key: 'target_advantages_hit' },
        { label: '来源类型', render: r => escapeHtml(r.source_types || r.source_type || '') }
      ], taskRows);
    }

    function metricHeaders(label) {
      return [
        { label, key: 'name' },
        { label: '问题数', key: 'questions', class: 'num' },
        { label: '采样<span class="help">已采样 / 计划</span>', render: r => `${r.completed}/${r.planned}`, class: 'num' },
        { label: '提及 / 首推', render: r => `${percent(r.mentions, r.completed)} / ${percent(r.firsts, r.completed)}`, class: 'num' },
        { label: '有效首推<span class="help">剔除官方工具首推</span>', render: r => `${r.firsts}/${r.effectiveFirstDenominator}<br>${percent(r.firsts, r.effectiveFirstDenominator)}`, class: 'num' },
        { label: '前3 / 均排', render: r => `${percent(r.top3, r.completed)} / ${rankText(r.rankSum, r.rankCount)}`, class: 'num' },
        { label: '心智分', render: r => r.mindScoreCount ? (r.mindScoreSum / r.mindScoreCount).toFixed(1).replace(/\.0$/, '') : '暂无', class: 'num' },
        { label: '证据<span class="help">优势 / 运营圈引用</span>', render: r => `${percent(r.advantages, r.completed)} / ${percent(r.sources, r.completed)}`, class: 'num' },
        { label: '风险<span class="help">竞品 / 官方工具</span>', render: r => `${percent(r.competitors, r.completed)} / ${percent(r.officialTools, r.completed)}`, class: 'num' }
      ];
    }

    function pill(value) {
      if (value === '是') return '<span class="pill ok">是</span>';
      if (value === '否') return '<span class="pill warn">否</span>';
      return '<span class="pill">待采集</span>';
    }

    function bindFilters() {
      optionList($('priorityFilter'), uniq(rows.map(r => r.priority)), '全部优先级');
      optionList($('categoryFilter'), uniq(rows.map(r => r.category)), '全部分类');
      optionList($('keywordFilter'), uniq(rows.map(r => r.keyword)), '全部关键词');
      [
        ['priorityFilter', 'priority'],
        ['categoryFilter', 'category'],
        ['keywordFilter', 'keyword'],
        ['mentionFilter', 'mention']
      ].forEach(([id, key]) => $(id).addEventListener('change', e => { state[key] = e.target.value; render(); }));
      $('searchInput').addEventListener('input', e => { state.search = e.target.value; render(); });
    }

    $('scopeTitle').textContent = window.GEO_DASHBOARD.meta.scope_label || '仪表盘';
    $('sourceUrl').textContent = window.GEO_DASHBOARD.meta.yunyingquan_url;
    $('updatedAt').textContent = window.GEO_DASHBOARD.meta.generated_at;
    bindFilters();
    render();
  </script>
</body>
</html>
