<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>蝉妈妈 GEO 采样仪表盘</title>
  <script src="./dashboard-data.js?v=20260710-318"></script>
  <style>
    :root {
      --surface: #f8fafc;
      --panel: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #cbd5e1;
      --line-soft: #e2e8f0;
      --blue: #1e40af;
      --blue-soft: #dbeafe;
      --amber: #d97706;
      --green: #047857;
      --red: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--surface);
      color: var(--ink);
      font-family: "IBM Plex Sans", "Inter", "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      letter-spacing: 0;
    }
    .app { min-height: 100vh; }
    header {
      border-bottom: 1px solid var(--line);
      background: #0f172a;
      color: #f8fafc;
      padding: 22px 28px 18px;
    }
    .tick-rule {
      height: 12px;
      margin-bottom: 18px;
      background: repeating-linear-gradient(90deg, rgba(248,250,252,.75) 0 1px, transparent 1px 24px);
      opacity: .6;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 56px);
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0;
    }
    .subtitle {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin-top: 12px;
      color: #cbd5e1;
      font-size: 13px;
    }
    main { padding: 24px 28px 40px; }
    .filters {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }
    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    select, input {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
    }
    .executive-brief {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      border: 1px solid #1e293b;
      border-radius: 8px;
      background: #111827;
      color: #f8fafc;
      padding: 18px 20px;
      margin-bottom: 12px;
    }
    .brief-kicker {
      color: #93c5fd;
      font-size: 12px;
      font-weight: 850;
    }
    .brief-title {
      margin-top: 8px;
      font-size: clamp(20px, 2.5vw, 32px);
      line-height: 1.18;
      font-weight: 900;
    }
    .brief-note {
      margin-top: 8px;
      color: #cbd5e1;
      line-height: 1.5;
    }
    .brief-status {
      display: grid;
      justify-items: end;
      gap: 8px;
      min-width: 180px;
      font-variant-numeric: tabular-nums;
    }
    .brief-status strong {
      font-size: 30px;
      line-height: 1;
    }
    .brief-status span {
      color: #cbd5e1;
      font-size: 12px;
      font-weight: 750;
    }
    .executive-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }
    .overview-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 10px;
    }
    .exec-card {
      display: grid;
      grid-template-rows: auto auto auto auto auto;
      gap: 10px;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
    }
    .exec-card.risk { border-top: 4px solid var(--red); }
    .exec-card.warn { border-top: 4px solid var(--amber); }
    .exec-card.ok { border-top: 4px solid var(--green); }
    .exec-card.muted { border-top: 4px solid var(--muted); }
    .exec-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }
    .exec-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .status-chip {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    .status-chip.ok { background: #dcfce7; color: var(--green); }
    .status-chip.warn { background: #fef3c7; color: #92400e; }
    .status-chip.risk { background: #fee2e2; color: var(--red); }
    .status-chip.muted { background: #e2e8f0; color: #475569; }
    .exec-main {
      font-variant-numeric: tabular-nums;
      font-size: 28px;
      line-height: 1.05;
      font-weight: 850;
    }
    .exec-sub {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .evidence-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
      color: #334155;
      font-size: 11px;
    }
    .evidence-list li {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 5px;
    }
    .evidence-list li > span {
      display: grid;
      gap: 2px;
      min-width: 0;
    }
    .evidence-list small {
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.25;
    }
    .evidence-list strong {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .exec-readout {
      color: #334155;
      font-size: 12px;
      line-height: 1.4;
      font-weight: 700;
    }
    .exec-next {
      border-top: 1px solid var(--line-soft);
      padding-top: 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }
    .action-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 2fr;
      gap: 14px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
      margin-bottom: 16px;
    }
    .action-panel h2 {
      font-size: 16px;
    }
    .action-copy {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .action-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .action-list li {
      border: 1px solid var(--line-soft);
      border-radius: 6px;
      padding: 8px 10px;
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      font-weight: 750;
    }
    .metric-guide {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 16px;
      margin-bottom: 20px;
    }
    .metric-guide-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .metric-guide-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .metric-guide-item {
      border: 1px solid var(--line-soft);
      border-radius: 6px;
      background: #f8fafc;
      padding: 10px 12px;
    }
    .metric-guide-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--ink);
    }
    .metric-guide-item span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .analysis-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      margin-bottom: 20px;
    }
    .chart-card {
      min-height: 260px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .chart-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }
    .donut-row {
      display: grid;
      grid-template-columns: 164px minmax(0, 1fr);
      align-items: center;
      gap: 16px;
      min-height: 178px;
    }
    .donut {
      position: relative;
      width: 156px;
      height: 156px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: #e2e8f0;
    }
    .donut::after {
      content: "";
      position: absolute;
      inset: 34px;
      border-radius: 50%;
      background: var(--panel);
      border: 1px solid var(--line-soft);
    }
    .donut-center {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: grid;
      place-content: center;
      text-align: center;
      font-variant-numeric: tabular-nums;
      font-weight: 850;
    }
    .donut-center small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
    }
    .legend {
      display: grid;
      gap: 8px;
      color: #334155;
      font-size: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-variant-numeric: tabular-nums;
    }
    .legend-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }
    .swatch {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      flex: 0 0 auto;
    }
    .bar-list {
      display: grid;
      gap: 10px;
      min-height: 178px;
      align-content: center;
    }
    .bar-row {
      display: grid;
      grid-template-columns: minmax(92px, 132px) minmax(0, 1fr) 56px;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }
    .bar-label {
      color: #334155;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .bar-track {
      height: 10px;
      border: 1px solid var(--line-soft);
      background: #f1f5f9;
    }
    .bar-fill {
      height: 100%;
      min-width: 0;
      background: var(--blue);
    }
    .bar-value {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .chart-note {
      color: var(--muted);
      font-size: 12px;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
    }
    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f1f5f9;
    }
    h2 {
      margin: 0;
      font-size: 14px;
      line-height: 1.2;
      font-weight: 850;
    }
    .table-wrap { overflow: auto; max-height: 560px; }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      border-bottom: 1px solid var(--line-soft);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #e2e8f0;
      color: #334155;
      font-size: 12px;
      font-weight: 850;
      white-space: nowrap;
    }
    td { line-height: 1.45; }
    .num { font-variant-numeric: tabular-nums; white-space: nowrap; }
    .help {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      white-space: normal;
    }
    .decision-list {
      display: grid;
      gap: 12px;
      padding: 14px;
      max-height: 680px;
      overflow: auto;
    }
    .decision-card {
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #ffffff;
      padding: 14px;
    }
    .decision-card-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 12px;
    }
    .decision-question {
      margin-top: 8px;
      color: var(--ink);
      font-size: 16px;
      font-weight: 850;
      line-height: 1.45;
    }
    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }
    .decision-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr 1fr;
      gap: 12px;
      align-items: stretch;
    }
    .mini-panel {
      border: 1px solid var(--line-soft);
      border-radius: 6px;
      background: #f8fafc;
      padding: 10px;
    }
    .mini-panel h3 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .mini-rows {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .mini-rows li {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #334155;
      font-size: 12px;
    }
    .mini-rows strong {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    .score-main {
      font-size: 24px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
    }
    .score-note {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .decision-reason {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: #f8fafc;
      color: #334155;
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }
    .pill.ok { border-color: #86efac; background: #dcfce7; color: var(--green); }
    .pill.warn { border-color: #fcd34d; background: #fef3c7; color: #92400e; }
    .question { min-width: 360px; }
    .task-table {
      min-width: 1860px;
      table-layout: fixed;
    }
    .task-table th,
    .task-table td {
      padding: 9px 10px;
    }
    .task-id { width: 88px; }
    .task-priority { width: 118px; }
    .task-topic { width: 126px; }
    .task-question {
      width: 330px;
      min-width: 330px;
    }
    .heat-col {
      width: 94px;
      color: var(--blue);
      font-weight: 850;
      white-space: nowrap;
    }
    .impact-col { width: 74px; }
    .gap-col { width: 168px; }
    .action-col {
      width: 210px;
      min-width: 210px;
    }
    .signal-col {
      width: 300px;
      min-width: 300px;
    }
    .action-cell {
      display: grid;
      gap: 4px;
      color: #334155;
    }
    .action-cell strong {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.35;
    }
    .action-cell span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }
    .priority-cell {
      display: grid;
      gap: 4px;
    }
    .priority-cell strong {
      color: var(--red);
      font-size: 14px;
      font-weight: 900;
    }
    .priority-cell span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .topic-cell,
    .signal-cell {
      display: grid;
      gap: 6px;
    }
    .topic-cell strong,
    .signal-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }
    .topic-cell span {
      color: var(--ink);
      font-weight: 750;
    }
    .signal-line {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
    }
    .term-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-width: 0;
    }
    .term-chip {
      display: inline-flex;
      align-items: center;
      max-width: 112px;
      min-height: 22px;
      border: 1px solid var(--line-soft);
      border-radius: 999px;
      background: #f8fafc;
      color: #334155;
      padding: 2px 7px;
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .term-chip.more {
      color: var(--muted);
      background: #eef2f7;
    }
    .empty { color: var(--muted); }
    @media (max-width: 1280px) {
      .executive-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 980px) {
      header, main { padding-left: 16px; padding-right: 16px; }
      .filters, .action-list, .metric-guide-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .executive-grid { grid-template-columns: 1fr; }
      .executive-brief, .action-panel { grid-template-columns: 1fr; }
      .decision-grid { grid-template-columns: 1fr; }
      .brief-status { justify-items: start; }
      .chart-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .filters, .executive-grid, .action-list, .metric-guide-grid { grid-template-columns: 1fr; }
      .decision-card-head { grid-template-columns: 1fr; }
      .donut-row { grid-template-columns: 1fr; justify-items: center; }
      h1 { font-size: 32px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="tick-rule"></div>
      <h1>蝉妈妈 GEO <span id="scopeTitle">仪表盘</span></h1>
      <div class="subtitle">
        <span>入口：爱搜 GEO / 豆包 / 网页 / 快速</span>
        <span>运营圈：<span id="sourceUrl"></span></span>
        <span>更新：<span id="updatedAt"></span></span>
      </div>
    </header>
    <main>
      <div class="executive-brief" id="executiveBrief"></div>
      <div class="executive-grid" id="kpis"></div>
      <section class="action-panel" id="actionPanel"></section>
      <section class="metric-guide" id="metricGuide"></section>
      <div class="overview-head">
        <h2>图表与明细</h2>
        <span class="pill">支持下钻核对</span>
      </div>
      <div class="filters">
        <label>优先级<select id="priorityFilter"></select></label>
        <label>分类<select id="categoryFilter"></select></label>
        <label>关键词<select id="keywordFilter"></select></label>
        <label>提及状态<select id="mentionFilter">
          <option value="all">全部</option>
          <option value="mentioned">已提及</option>
          <option value="not-mentioned">未提及</option>
        </select></label>
        <label>搜索<input id="searchInput" type="search" placeholder="问题或关键词"></label>
      </div>
      <div class="chart-grid" id="chartGrid"></div>
      <div class="analysis-grid">
        <section>
          <div class="section-head"><h2>为什么没首推</h2><span class="pill" id="reasonCount"></span></div>
          <div class="table-wrap"><table id="reasonTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>引用证据</h2><span class="pill" id="sourceEvidenceCount"></span></div>
          <div class="table-wrap"><table id="sourceEvidenceTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>官方工具 vs 蝉妈妈 vs 第三方竞品阵营对比</h2><span class="pill" id="brandGroupCount"></span></div>
          <div class="table-wrap"><table id="brandGroupTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>单品牌/工具曝光对比</h2><span class="pill" id="brandComparisonCount"></span></div>
          <div class="table-wrap"><table id="brandComparisonTable"></table></div>
        </section>
      </div>

      <div class="grid">
        <section>
          <div class="section-head"><h2>核心问题周度判定</h2><span class="pill" id="decisionCount"></span></div>
          <div class="decision-list" id="decisionTable"></div>
        </section>
        <section>
          <div class="section-head"><h2>分类维度</h2><span class="pill" id="categoryCount"></span></div>
          <div class="table-wrap"><table id="categoryTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>关键词维度</h2><span class="pill" id="keywordCount"></span></div>
          <div class="table-wrap"><table id="keywordTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>问题维度</h2><span class="pill" id="questionCount"></span></div>
          <div class="table-wrap"><table id="questionTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>单次采样记录</h2><span class="pill" id="sampleCount"></span></div>
          <div class="table-wrap"><table id="sampleTable"></table></div>
        </section>
        <section>
          <div class="section-head"><h2>GEO 内容优先级看板</h2><span class="pill" id="taskCount"></span></div>
          <div class="table-wrap"><table id="taskTable" class="task-table"></table></div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const state = { priority: 'all', category: 'all', keyword: 'all', mention: 'all', search: '' };
    const rows = window.GEO_DASHBOARD.summary;
    const samples = window.GEO_DASHBOARD.samples;
    const questions = window.GEO_DASHBOARD.questions;
    const tasks = window.GEO_DASHBOARD.content_tasks || [];
    const repairList = window.GEO_DASHBOARD.content_repair_list || tasks;
    const questionDecisions = window.GEO_DASHBOARD.question_decisions || [];
    const keywordDecisions = window.GEO_DASHBOARD.keyword_decisions || [];
    const nonChanmamaReasons = window.GEO_DASHBOARD.non_chanmama_reason_summary || [];
    const sourceEvidenceSummary = window.GEO_DASHBOARD.source_evidence_summary || [];
    const brandGroupComparison = window.GEO_DASHBOARD.brand_group_comparison || [];
    const brandComparison = window.GEO_DASHBOARD.brand_comparison || [];

    const $ = (id) => document.getElementById(id);
    const uniq = (items) => [...new Set(items.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
    const asNum = (value) => Number.parseInt(value || '0', 10) || 0;
    const percent = (n, d) => d > 0 ? `${Math.round(n * 100 / d)}%` : '0%';
    const rankText = (sum, count) => count > 0 ? (sum / count).toFixed(1).replace(/\.0$/, '') : '未进入排名';

    function optionList(select, values, allLabel) {
      select.innerHTML = `<option value="all">${allLabel}</option>` + values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
    }

    function splitTerms(value) {
      return String(value ?? '').split(/[、，,；;\/]+/).map(item => item.trim()).filter(Boolean);
    }

    function hasGap(row, gap) {
      return splitTerms(row.content_gap_types || row.content_gap_type).some(item => item.includes(gap));
    }

    function shortList(value, fallback, limit = 3) {
      const items = splitTerms(value);
      if (!items.length) return fallback;
      const head = items.slice(0, limit).join('、');
      return items.length > limit ? `${head}等` : head;
    }

    function actionCell(title, note = '') {
      return `<div class="action-cell"><strong>${escapeHtml(title)}</strong>${note ? `<span>${escapeHtml(note)}</span>` : ''}</div>`;
    }

    function formatHeat(value) {
      const raw = String(value ?? '').replace(/,/g, '').trim();
      if (!raw || raw === '待补采') return '待补采';
      const num = Number(raw);
      return Number.isFinite(num) && num > 0 ? num.toLocaleString('zh-CN') : raw;
    }

    function heatCell(row) {
      const heat = formatHeat(row.aidso_heat || row.aidso_heat_value || row['爱搜热度']);
      return heat === '待补采' ? '<span class="empty">待补采</span>' : escapeHtml(heat);
    }

    function heatNumber(row) {
      const raw = String(row.aidso_heat || row.aidso_heat_value || row['爱搜热度'] || '').replace(/,/g, '').trim();
      const num = Number(raw);
      return Number.isFinite(num) ? num : 0;
    }

    function numFrom(row, keys) {
      for (const key of keys) {
        if (row[key] !== undefined && row[key] !== null && row[key] !== '') return asNum(row[key]);
      }
      return 0;
    }

    function keywordDecision(row) {
      const completed = numFrom(row, ['completed', 'completed_sample_count']);
      const mentions = numFrom(row, ['mentions', 'chanmama_mention_count', 'mention_count']);
      const firsts = numFrom(row, ['firsts', 'chanmama_first_count', 'first_recommendation_count']);
      if (!completed) {
        return {
          label: '待判定',
          tone: 'muted',
          reason: '当前还没有有效样本，暂不做关键词结论。',
          action: '完成采样后再判定。'
        };
      }
      if (firsts >= Math.ceil(completed / 2)) {
        return {
          label: '达标',
          tone: 'ok',
          reason: `蝉妈妈首推 ${firsts}/${completed}，已形成稳定首推。`,
          action: '降低监测频率，改为每月抽检一次。'
        };
      }
      if (mentions > 0) {
        return {
          label: '半达标',
          tone: 'warn',
          reason: `蝉妈妈提及 ${mentions}/${completed}，但首推仅 ${firsts}/${completed}，还未形成稳定首推。`,
          action: '继续周度监测，同时生成内容加强任务。'
        };
      }
      return {
        label: '不达标',
        tone: 'risk',
        reason: `蝉妈妈提及 0/${completed}，当前样本未被 AI 看见。`,
        action: '优先生成内容优化任务，下周继续复测。'
      };
    }

    function keywordDecisionCell(row) {
      const decision = keywordDecision(row);
      return `<span class="status-chip ${decision.tone}">${escapeHtml(decision.label)}</span>`;
    }

    function keywordStatusSummary(keywordRows) {
      const counts = { '达标': 0, '半达标': 0, '不达标': 0, '待判定': 0 };
      keywordRows.forEach(row => {
        counts[keywordDecision(row).label] += 1;
      });
      const total = keywordRows.length || 0;
      const line = `${counts['半达标']}/${total} 半达标，${counts['达标']} 达标`;
      const readout = total && counts['半达标'] >= Math.ceil(total / 2)
        ? '多数关键词已被看见，但首推不稳定'
        : total && counts['达标'] >= Math.ceil(total / 2)
          ? '多数关键词已形成稳定首推'
          : '关键词仍需继续观察';
      return { counts, total, line, readout };
    }

    function topicCell(row) {
      return `<div class="topic-cell"><strong>${escapeHtml(row.category || '')}</strong><span>${escapeHtml(row.keyword || '')}</span></div>`;
    }

    function termChips(value, emptyText, limit = 4) {
      const items = splitTerms(value);
      if (!items.length) return `<span class="empty">${escapeHtml(emptyText)}</span>`;
      const chips = items.slice(0, limit).map(item => `<span class="term-chip" title="${escapeHtml(item)}">${escapeHtml(item)}</span>`).join('');
      const more = items.length > limit ? `<span class="term-chip more">+${items.length - limit}</span>` : '';
      return `<span class="term-list">${chips}${more}</span>`;
    }

    function signalRow(label, value, emptyText, limit = 4) {
      return `<div class="signal-line"><span class="signal-label">${escapeHtml(label)}</span>${termChips(value, emptyText, limit)}</div>`;
    }

    function signalCell(row) {
      return `<div class="signal-cell">
        ${signalRow('竞品', row.mentioned_competitors, '无', 4)}
        ${signalRow('官方', row.mentioned_official_tools, '无', 4)}
        ${signalRow('优势', row.target_advantages_hit, '待补', 5)}
      </div>`;
    }

    function sampleCompleted(row) {
      return Boolean(row.sample_date || row.answer_text);
    }

    function sampleMentionsChanmama(row) {
      return row.mentioned_chanmama === '是' || String(row.answer_text || '').includes('蝉妈妈');
    }

    function sampleIsChanmamaFirst(row) {
      return row.chanmama_is_first === '是' || row.first_recommendation === '蝉妈妈';
    }

    function sampleOfficialFirst(row) {
      const first = String(row.first_recommendation || '').trim();
      if (!first) return false;
      const tools = splitTerms(row.mentioned_official_tools);
      return tools.some(tool => first.includes(tool) || tool.includes(first)) || /抖音|巨量|官方|罗盘|百应|千川|算数|创作者/.test(first);
    }

    function buildFirstLossReasonRows(visibleQuestionIds) {
      const baseSamples = samples.filter(row => sampleCompleted(row) && visibleQuestionIds.has(row.question_id) && !sampleIsChanmamaFirst(row));
      const buckets = [
        {
          id: 'official',
          reason: '官方工具占位',
          explanation: '首推被抖音电商罗盘、巨量千川、巨量百应等官方工具拿走，AI 优先相信平台内后台口径。',
          suggested_action: '优先补“官方后台看经营结果，蝉妈妈补市场、达人、商品、竞品”的对比页和 FAQ。',
          rows: []
        },
        {
          id: 'mentioned',
          reason: '提到蝉妈妈但未首推',
          explanation: '蝉妈妈已进入候选集，但排序理由不够强，未成为第一推荐。',
          suggested_action: '补“为什么优先推荐蝉妈妈”的场景案例、榜单、功能对比和第三方测评。',
          rows: []
        },
        {
          id: 'missing',
          reason: '未提到蝉妈妈',
          explanation: '回答没有把蝉妈妈纳入推荐候选，需要先解决品牌可见度。',
          suggested_action: '优先做高热度场景页、工具推荐页和可引用内容，让 AI 先看见蝉妈妈。',
          rows: []
        }
      ];
      baseSamples.forEach(row => {
        if (sampleOfficialFirst(row)) buckets[0].rows.push(row);
        else if (sampleMentionsChanmama(row)) buckets[1].rows.push(row);
        else buckets[2].rows.push(row);
      });
      const base = baseSamples.length;
      return buckets
        .filter(bucket => bucket.rows.length)
        .map((bucket, index) => {
          const questionIds = new Set(bucket.rows.map(row => row.question_id));
          const exampleQuestions = [...new Set(bucket.rows.map(row => row.question_text).filter(Boolean))].slice(0, 3).join('、');
          return {
            reason_id: `TOP${index + 1}`,
            reason: bucket.reason,
            sample_count: bucket.rows.length,
            sample_rate: percent(bucket.rows.length, base),
            base_sample_count: base,
            affected_question_count: questionIds.size,
            explanation: bucket.explanation,
            suggested_action: bucket.suggested_action,
            example_questions: exampleQuestions
          };
        });
    }

    function priorityLevel(row) {
      const heat = heatNumber(row);
      const official = hasGap(row, '官方工具压制') || asNum(row.official_tool_mention_count) > 0;
      const notFirst = hasGap(row, '提及但不首推') || asNum(row.first_recommendation_count) < asNum(row.completed_sample_count);
      const missing = hasGap(row, '未提及蝉妈妈') || asNum(row.mention_count) === 0;
      if (heat >= 10000 && official && notFirst) return ['P0', '高热度 + 未首推 + 官方压制'];
      if (heat >= 1000 && (official || missing || notFirst)) return ['P1', '高热度场景优先优化'];
      if (official && notFirst) return ['P1', '官方占位影响首推'];
      if (missing) return ['P2', '先补品牌可见度'];
      return ['P3', '持续观察'];
    }

    function priorityScore(row) {
      const heat = heatNumber(row);
      const heatScore = heat >= 10000 ? 50 : heat >= 5000 ? 42 : heat >= 1000 ? 34 : heat >= 100 ? 22 : 8;
      const officialScore = hasGap(row, '官方工具压制') || asNum(row.official_tool_mention_count) > 0 ? 28 : 0;
      const notFirstScore = hasGap(row, '提及但不首推') || asNum(row.first_recommendation_count) < asNum(row.completed_sample_count) ? 22 : 0;
      const missingScore = hasGap(row, '未提及蝉妈妈') || asNum(row.mention_count) === 0 ? 20 : 0;
      return heatScore + officialScore + notFirstScore + missingScore + asNum(row.affected_sample_count);
    }

    function priorityCell(row) {
      const [level, reason] = priorityLevel(row);
      return `<div class="priority-cell"><strong>${escapeHtml(level)}</strong><span>${escapeHtml(reason)}</span></div>`;
    }

    function boardEvidence(row) {
      const completed = asNum(row.completed_sample_count);
      const firsts = asNum(row.first_recommendation_count);
      const official = asNum(row.official_tool_mention_count);
      return `<div class="action-cell"><strong>${escapeHtml(`未首推 ${Math.max(completed - firsts, 0)}/${completed}`)}</strong><span>${escapeHtml(`官方工具 ${official}/${completed}；影响样本 ${row.affected_sample_count || 1}`)}</span></div>`;
    }

    function buildPriorityBoardRows(taskRows) {
      const map = new Map();
      taskRows.forEach(row => {
        const key = row.question_id || row.question_text || row.repair_id || row.task_id;
        const item = map.get(key) || {...row, affected_sample_count: 0};
        item.affected_sample_count += asNum(row.affected_sample_count || 1);
        item.content_gap_types = [...new Set([...splitTerms(item.content_gap_types || item.content_gap_type), ...splitTerms(row.content_gap_types || row.content_gap_type)])].join('、');
        item.mentioned_competitors = [...new Set([...splitTerms(item.mentioned_competitors), ...splitTerms(row.mentioned_competitors)])].join('、');
        item.mentioned_official_tools = [...new Set([...splitTerms(item.mentioned_official_tools), ...splitTerms(row.mentioned_official_tools)])].join('、');
        item.target_advantages_hit = [...new Set([...splitTerms(item.target_advantages_hit), ...splitTerms(row.target_advantages_hit)])].join('、');
        map.set(key, item);
      });
      return [...map.values()]
        .map(row => ({...row, priority_score: priorityScore(row)}))
        .sort((a, b) => b.priority_score - a.priority_score || heatNumber(b) - heatNumber(a));
    }

    function optimizationDirection(row) {
      const official = hasGap(row, '官方工具压制');
      const competitor = hasGap(row, '竞品压制');
      const missing = hasGap(row, '未提及蝉妈妈');
      const notFirst = hasGap(row, '提及但不首推');
      const source = hasGap(row, '引用来源不足') || hasGap(row, '引用源缺失');
      if (official && competitor) return actionCell('官方对比 + 竞品替代', '同时解决官方工具和竞品抢位');
      if (official && notFirst) return actionCell('官方对比 + 首推强化', '解释官方后台与蝉妈妈的分工');
      if (official && missing) return actionCell('品牌入口 + 官方对比', '先让答案提到蝉妈妈');
      if (competitor) return actionCell('竞品替代证明', '证明蝉妈妈在该场景更合适');
      if (source) return actionCell('补引用证据', '让 AI 有可信来源可引用');
      if (missing) return actionCell('补品牌可见内容', '覆盖工具推荐和场景问法');
      if (notFirst) return actionCell('首推理由强化', '补足优先推荐蝉妈妈的理由');
      return actionCell('持续观察', '保留周度复测');
    }

    function optimizationFocus(row) {
      const focus = [];
      if (hasGap(row, '官方工具压制')) focus.push('官方看经营结果；蝉妈妈补市场/达人/商品/竞品');
      if (hasGap(row, '提及但不首推')) focus.push('补“为什么优先推荐蝉妈妈”');
      if (hasGap(row, '竞品压制')) focus.push(`对比 ${shortList(row.mentioned_competitors, '飞瓜/抖查查/新抖', 3)}`);
      if (hasGap(row, '未提及蝉妈妈')) focus.push(`围绕「${row.keyword || '核心场景'}」补工具推荐入口`);
      if (hasGap(row, '引用来源不足') || hasGap(row, '引用源缺失')) focus.push('补官网、运营圈、外站可引用证据');
      const title = focus[0] || `强化 ${shortList(row.target_advantages_hit, '数据覆盖/场景适配', 3)}`;
      const note = focus.slice(1, 3).join('；') || `优势：${shortList(row.target_advantages_hit, '数据覆盖/场景适配', 3)}`;
      return actionCell(title, note);
    }

    function optimizationDeliverable(row) {
      const official = hasGap(row, '官方工具压制');
      const competitor = hasGap(row, '竞品压制');
      const missing = hasGap(row, '未提及蝉妈妈');
      const source = hasGap(row, '引用来源不足') || hasGap(row, '引用源缺失');
      if (official && competitor) return actionCell('三方对比页 / 替代页', `重点对比 ${shortList(row.mentioned_competitors, '飞瓜/抖查查/新抖', 2)}`);
      if (official) return actionCell('对比页 / FAQ', '官方后台 vs 第三方工具分工');
      if (competitor) return actionCell('竞品对比页 / 替代页', `重点对比 ${shortList(row.mentioned_competitors, '飞瓜/抖查查/新抖', 2)}`);
      if (source) return actionCell('官网案例 / 外站测评', '确保可被 AI 引用');
      if (missing) return actionCell('榜单页 / 场景页', `覆盖「${row.keyword || '核心'}」推荐问法`);
      return actionCell('场景 FAQ', '下轮复测首推变化');
    }

    function filteredSummary() {
      const query = state.search.trim().toLowerCase();
      return rows.filter(row => {
        if (state.priority !== 'all' && row.priority !== state.priority) return false;
        if (state.category !== 'all' && row.category !== state.category) return false;
        if (state.keyword !== 'all' && row.keyword !== state.keyword) return false;
        if (state.mention === 'mentioned' && asNum(row.mention_count) === 0) return false;
        if (state.mention === 'not-mentioned' && asNum(row.mention_count) > 0) return false;
        if (query && !`${row.keyword} ${row.question_text}`.toLowerCase().includes(query)) return false;
        return true;
      });
    }

    function aggregate(items, key) {
      const map = new Map();
      items.forEach(row => {
        const name = row[key];
        const item = map.get(name) || {
          name, questions: 0, planned: 0, completed: 0, mentions: 0, firsts: 0, top3: 0,
          effectiveFirstDenominator: 0, officialFirstExcluded: 0,
          rankSum: 0, rankCount: 0, mindScoreSum: 0, mindScoreCount: 0,
          advantages: 0, competitors: 0, officialTools: 0,
          sources: 0, officialSources: 0, externalSources: 0
        };
        item.questions += 1;
        item.planned += asNum(row.planned_sample_count);
        item.completed += asNum(row.completed_sample_count);
        item.mentions += asNum(row.mention_count);
        item.firsts += asNum(row.first_recommendation_count);
        item.effectiveFirstDenominator += asNum(row.effective_first_recommendation_denominator);
        item.officialFirstExcluded += asNum(row.official_first_excluded_count);
        item.top3 += asNum(row.top3_chanmama_count);
        const rankCount = asNum(row.ranked_chanmama_count);
        const avgRank = Number.parseFloat(row.avg_chanmama_rank || '0');
        if (rankCount && avgRank) {
          item.rankSum += avgRank * rankCount;
          item.rankCount += rankCount;
        }
        item.mindScoreSum += asNum(row.mind_influence_score_sum);
        item.mindScoreCount += asNum(row.completed_sample_count);
        item.advantages += asNum(row.advantage_hit_count);
        item.competitors += asNum(row.competitor_mention_count);
        item.officialTools += asNum(row.official_tool_mention_count);
        item.sources += asNum(row.yunyingquan_source_count);
        item.officialSources += asNum(row.official_source_count);
        item.externalSources += asNum(row.external_source_count);
        map.set(name, item);
      });
      return [...map.values()].sort((a, b) => b.planned - a.planned || a.name.localeCompare(b.name, 'zh-CN'));
    }

    function renderTable(id, headers, bodyRows) {
      const table = $(id);
      table.innerHTML = `<thead><tr>${headers.map(h => `<th class="${h.class || ''}">${h.label}</th>`).join('')}</tr></thead><tbody>${
        bodyRows.map(row => `<tr>${headers.map(h => `<td class="${h.class || ''}">${h.render ? h.render(row) : escapeHtml(row[h.key])}</td>`).join('')}</tr>`).join('')
      }</tbody>`;
    }

    function metricGuideItem(name, desc) {
      return `<div class="metric-guide-item"><strong>${escapeHtml(name)}</strong><span>${escapeHtml(desc)}</span></div>`;
    }

    function renderMetricGuide() {
      $('metricGuide').innerHTML = `<div class="metric-guide-head">
        <h2>指标说明</h2>
        <span class="pill">把口径放在页面内，方便汇报时解释</span>
      </div>
      <div class="metric-guide-grid">
        ${[
          ['爱搜热度', '来自 AIDSO 官网搜索记录的热度值；未补采时显示待补采，不再使用源表流量代替。'],
          ['累计 / 本周新增', '累计采样使用当前真实已采样数 / 计划样本数；本周新增只统计进入下一轮周度复测后的新增样本，本批次未进入周度复测时显示 0/6。'],
          ['关键词判定', '达标=蝉妈妈首推稳定且稳定出现；半达标=已提到蝉妈妈但未形成稳定首推；不达标=当前样本未提到蝉妈妈。页面按当前样本首推是否达到半数以上判断稳定首推。'],
          ['提及率', '已采样回答里出现“蝉妈妈”的比例，代表品牌是否被 AI 看见。'],
          ['首推率', '已采样回答里把蝉妈妈放在第一推荐的比例，代表推荐优先级。'],
          ['有效首推率', '把抖音官方工具首推样本剔除后再看蝉妈妈首推率，避免被抖音电商罗盘、巨量千川、巨量引擎等官方工具压低判断。'],
          ['得分', '单次样本仍按首推 5 分、第 2 名 4 分、第 3 名 3 分、提及但非前三 2 分、未提及 0 分记录；每题 6 次后统一换算为 10 分制，7.3 分视为达标。'],
          ['均排', '蝉妈妈进入推荐排名时的平均名次，数字越小越好；未进入排名的样本不参与均排计算。'],
          ['心智分', '首推 100，第二 85，第三 70，提及但非前三 50，未提及 0，用来衡量 AI 对品牌推荐强度。'],
          ['结果差异', '同一问题多次采样后的回答分布，拆成未提及、提及非首推、首推三类看稳定性。'],

    const chartColors = ['#1e40af', '#d97706', '#047857', '#7c3aed', '#0f766e', '#b91c1c', '#64748b', '#0ea5e9'];

    function chartCard(title, body, note = '') {
      return `<section class="chart-card">
        <div class="section-head"><h2>${escapeHtml(title)}</h2>${note ? `<span class="pill">${escapeHtml(note)}</span>` : ''}</div>
        <div class="chart-body">${body}</div>
      </section>`;
    }

    function donutChart(title, segments, center, note) {
      const total = segments.reduce((sum, item) => sum + Math.max(0, item.value), 0);
      let cursor = 0;
      const stops = total > 0 ? segments.map((item, index) => {
        const start = cursor;
        const end = cursor + item.value * 100 / total;
        cursor = end;
        return `${item.color || chartColors[index % chartColors.length]} ${start.toFixed(2)}% ${end.toFixed(2)}%`;
      }).join(', ') : '#e2e8f0 0% 100%';
      const legend = segments.map((item, index) => `<div class="legend-item">
        <span class="legend-name"><span class="swatch" style="background:${item.color || chartColors[index % chartColors.length]}"></span>${escapeHtml(item.name)}</span>
        <strong>${escapeHtml(item.label ?? String(item.value))}</strong>
      </div>`).join('');
      return chartCard(title, `<div class="donut-row">
        <div class="donut" style="background: conic-gradient(${stops});"><div class="donut-center">${center}<small>${escapeHtml(note)}</small></div></div>
        <div class="legend">${legend}</div>
      </div>`);
    }

    function barChart(title, items, note = '', scaleMax = null) {
      const max = scaleMax || Math.max(...items.map(item => item.value), 1);
      const bars = items.map((item, index) => {
        const width = item.value > 0 ? Math.max(1, Math.round(item.value * 100 / max)) : 0;
        const color = item.color || chartColors[index % chartColors.length];
        return `<div class="bar-row">
          <div class="bar-label" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${width}%;background:${color}"></div></div>
          <div class="bar-value">${escapeHtml(item.label ?? String(item.value))}</div>
        </div>`;
      }).join('');
      return chartCard(title, `<div class="bar-list">${bars}</div>${note ? `<div class="chart-note">${escapeHtml(note)}</div>` : ''}`);
    }

    const pctNumber = (n, d) => d > 0 ? Math.round(n * 100 / d) : 0;

    function confidenceState(completed, planned) {
      const rate = planned > 0 ? completed / planned : 0;
      if (completed < 30 || rate < 0.1) return { label: '早期观察', tone: 'muted', note: '样本不足，仅作早期信号' };
      if (completed < 100 || rate < 0.35) return { label: '待验证', tone: 'warn', note: '已有方向，但仍需继续采样' };
      if (completed < 300 || rate < 0.75) return { label: '可判断', tone: 'ok', note: '可以用于阶段判断' };
      return { label: '稳定判断', tone: 'ok', note: '样本覆盖较充分' };
    }

    function brandState(avgMindScore, effectiveFirstRate) {
      const score = Number.parseFloat(avgMindScore || '0');
      if (!score) return { label: '暂无数据', tone: 'muted', note: '还没有足够样本判断品牌推荐力' };
      if (score >= 80 && effectiveFirstRate >= 50) return { label: '强', tone: 'ok', note: '推荐力较强，已接近稳定首推' };
      if (score >= 55) return { label: '中等', tone: 'warn', note: '推荐力中等，仍未形成稳定首推' };
      return { label: '偏弱', tone: 'risk', note: '推荐力偏弱，需要优先补内容证据' };
    }

    function riskState(officialTools, competitors, completed) {
      const officialRate = pctNumber(officialTools, completed);
      const competitorRate = pctNumber(competitors, completed);
      if (!completed) return { label: '待判断', tone: 'muted', note: '还没有样本判断压制来源' };
      if (officialRate >= 50 && officialRate >= competitorRate) {
        return { label: '官方工具压制', tone: 'warn', note: '主要不是竞品压制，而是抖音官方工具占位' };
      }
      if (competitorRate >= 30) return { label: '竞品压制', tone: 'risk', note: '竞品出现频率较高，需要反查引用源' };
      return { label: '暂未显著', tone: 'ok', note: '暂未看到明显竞品或官方工具压制' };
    }

    function evidenceRows(rows) {
      return `<ul class="evidence-list">${rows.map(([label, value, hint]) => `<li><span>${escapeHtml(label)}${hint ? `<small>${escapeHtml(hint)}</small>` : ''}</span><strong>${escapeHtml(value)}</strong></li>`).join('')}</ul>`;
    }

    function executiveCard(title, state, main, sub, rows, readout, next) {
      return `<article class="exec-card ${state.tone}">
        <div class="exec-top"><div class="exec-title">${escapeHtml(title)}</div><span class="status-chip ${state.tone}">${escapeHtml(state.label)}</span></div>
        <div>
          <div class="exec-main">${escapeHtml(main)}</div>
          <div class="exec-sub">${escapeHtml(sub)}</div>
        </div>
        ${evidenceRows(rows)}
        <div class="exec-readout">${escapeHtml(readout)}</div>
        <div class="exec-next">${escapeHtml(next)}</div>
      </article>`;
    }

      $('executiveBrief').innerHTML = `<div>

        executiveCard('品牌推荐力', brand, `${metrics.avgMindScore}`, `${brand.note}`, [
          ['提及率', mentionRate],
          ['首推率', firstRate],
          ['有效首推率', `${effectiveFirstRate}%（剔除官方工具）`],
          ['前 3 率 / 均排', `${top3Rate} / ${rankText(metrics.rankSum, metrics.rankCount)}`],

        executiveCard('压制风险', risk, risk.label, risk.note, [
          ['官方工具', `${metrics.officialTools} 次，${percent(metrics.officialTools, metrics.completed)}`],
          ['官方首推排除', `${metrics.officialFirstExcluded} 次`],
          ['竞品提及', `${metrics.competitors} 次，${percent(metrics.competitors, metrics.completed)}`],
          ['样本基数', `${metrics.completed} 次`]

      ].join('');

      $('actionPanel').innerHTML = `<div>
        <h2>下一步动作</h2>

    function renderCompetitiveAnalysis(visibleQuestionIds) {

    function render() {
      const data = filteredSummary();
      const planned = data.reduce((sum, row) => sum + asNum(row.planned_sample_count), 0);
      const completed = data.reduce((sum, row) => sum + asNum(row.completed_sample_count), 0);
      const mentions = data.reduce((sum, row) => sum + asNum(row.mention_count), 0);
      const firsts = data.reduce((sum, row) => sum + asNum(row.first_recommendation_count), 0);
      const effectiveFirstDenominator = data.reduce((sum, row) => sum + asNum(row.effective_first_recommendation_denominator), 0);
      const officialFirstExcluded = data.reduce((sum, row) => sum + asNum(row.official_first_excluded_count), 0);
      const top3 = data.reduce((sum, row) => sum + asNum(row.top3_chanmama_count), 0);
      const rankPairs = data.map(row => [Number.parseFloat(row.avg_chanmama_rank || '0'), asNum(row.ranked_chanmama_count)]).filter(([rank, count]) => rank && count);
      const rankSum = rankPairs.reduce((sum, [rank, count]) => sum + rank * count, 0);
      const rankCount = rankPairs.reduce((sum, [, count]) => sum + count, 0);
      const mindScoreSum = data.reduce((sum, row) => sum + asNum(row.mind_influence_score_sum), 0);
      const avgMindScore = completed > 0 ? (mindScoreSum / completed).toFixed(1).replace(/\.0$/, '') : '暂无';
      const advantages = data.reduce((sum, row) => sum + asNum(row.advantage_hit_count), 0);
      const competitors = data.reduce((sum, row) => sum + asNum(row.competitor_mention_count), 0);
      const officialTools = data.reduce((sum, row) => sum + asNum(row.official_tool_mention_count), 0);
      const sources = data.reduce((sum, row) => sum + asNum(row.yunyingquan_source_count), 0);
      const officialSources = data.reduce((sum, row) => sum + asNum(row.official_source_count), 0);
      const externalSources = data.reduce((sum, row) => sum + asNum(row.external_source_count), 0);
      const visibleKeywords = new Set(data.map(r => r.keyword));
      const visibleQuestionIds = new Set(data.map(r => r.question_id));
      const summaryByQuestionId = new Map(data.map(row => [row.question_id, row]));
      const decisionRows = questionDecisions
        .filter(row => visibleQuestionIds.has(row.question_id))
        .map(row => ({...(summaryByQuestionId.get(row.question_id) || {}), ...row}));
      const passedQuestions = decisionRows.filter(row => row.codex_question_decision === '达标').length;
      const continuingQuestions = decisionRows.filter(row => row.continue_sampling === '是').length;
      const keywordDecisionRows = keywordDecisions.filter(row => visibleKeywords.has(row.keyword));
      const keywordDecisionMap = new Map(keywordDecisionRows.map(row => [row.keyword, row]));
      const keywordRows = aggregate(data, 'keyword')
        .map(row => ({...row, ...(keywordDecisionMap.get(row.name) || {})}));
      const passedKeywords = keywordRows.filter(row => keywordDecision(row).label === '达标').length;
      const keywordStatus = keywordStatusSummary(keywordRows);
      const brandRows = [...brandComparison].sort((a, b) => asNum(b.mention_count) - asNum(a.mention_count));
      const brandGroupRows = [...brandGroupComparison].sort((a, b) => asNum(b.first_recommendation_count) - asNum(a.first_recommendation_count));

      const metrics = {
        data,
        questionCount: data.length,
        planned,
        completed,
        mentions,
        firsts,
        effectiveFirstDenominator,
        officialFirstExcluded,
        top3,
        rankSum,
        rankCount,
        avgMindScore,
        mindScoreSum,
        advantages,
        competitors,
        officialTools,
        sources,
        officialSources,
        externalSources,
        passedQuestions,
        continuingQuestions,
        passedKeywords,
        keywordStatus,
        decisionRows,
        brandGroupRows,
        brandRows
      };
      renderExecutiveOverview(metrics);
      renderCharts(metrics);
      renderCompetitiveAnalysis(visibleQuestionIds);

      $('decisionCount').textContent = `${decisionRows.length} 个核心问题`;
      renderDecisionCards('decisionTable', decisionRows);

      const categoryRows = aggregate(data, 'category');
      $('categoryCount').textContent = `${categoryRows.length} 类`;
      renderTable('categoryTable', metricHeaders('分类'), categoryRows);

      $('keywordCount').textContent = `${keywordRows.length} 个关键词`;
      renderTable('keywordTable', [
        { label: '关键词', key: 'name' },
        { label: '状态', render: keywordDecisionCell },
        { label: '累计 / 本周新增', render: r => `${r.completed}/${r.planned}<br>${escapeHtml(r.weekly_progress_label || '0/6')}`, class: 'num' },
        { label: '原因', render: r => escapeHtml(keywordDecision(r).reason), class: 'question' },
        { label: '下一步动作', render: r => escapeHtml(keywordDecision(r).action), class: 'question' },
        { label: '问题数', key: 'questions', class: 'num' },
        { label: '采样<span class="help">已采样 / 计划</span>', render: r => `${r.completed}/${r.planned}`, class: 'num' },
        { label: '提及 / 首推', render: r => `${percent(r.mentions, r.completed)} / ${percent(r.firsts, r.completed)}`, class: 'num' },
        { label: '前3 / 均排', render: r => `${percent(r.top3, r.completed)} / ${rankText(r.rankSum, r.rankCount)}`, class: 'num' },
        { label: '优势表达', render: r => percent(r.advantages, r.completed), class: 'num' },
        { label: '风险<span class="help">竞品 / 官方工具</span>', render: r => `${percent(r.competitors, r.completed)} / ${percent(r.officialTools, r.completed)}`, class: 'num' }
      ], keywordRows);

      $('questionCount').textContent = `${data.length} 个问题`;
      renderTable('questionTable', [
        { label: '优先级', key: 'priority' },
        { label: '关键词', key: 'keyword' },
        { label: '爱搜热度<span class="help">官网热度值，需从爱搜补采</span>', render: r => escapeHtml(r.aidso_heat || r.aidso_heat_value || r['爱搜热度'] || r['热度值'] || '待补采'), class: 'num' },
        { label: '关键词流量<span class="help">源表流量，不等于爱搜热度</span>', render: r => escapeHtml(r.keyword_traffic || r.traffic || '暂无'), class: 'num' },
        { label: '问题', key: 'question_text', class: 'question' },
        { label: '问题类型', render: r => escapeHtml(r.question_type || r.intent || '') },
        { label: '采样<span class="help">已采样 / 计划</span>', render: r => `${r.completed_sample_count}/${r.planned_sample_count}`, class: 'num' },
        { label: '提及 / 首推<span class="help">品牌可见度与第一推荐</span>', render: r => `${r.mention_count} 次，${r.mention_rate}<br>${r.first_recommendation_count} 次，${r.first_recommendation_rate}`, class: 'num' },
        { label: '有效首推<span class="help">剔除抖音官方工具首推</span>', render: r => `${r.effective_first_recommendation_count || 0}/${r.effective_first_recommendation_denominator || 0}<br>${r.effective_first_recommendation_rate || '0%'}`, class: 'num' },
        { label: '均排 / 心智分<span class="help">均排越低越好；心智分越高越好</span>', render: r => `${escapeHtml(r.avg_chanmama_rank || '未进入')}<br>${escapeHtml(r.avg_mind_influence_score || '暂无')}`, class: 'num' },
        { label: '引用证据<span class="help">运营圈 / 官网 / 外站</span>', render: r => `${r.yunyingquan_source_count}/${r.official_source_count}/${r.external_source_count}`, class: 'num' }
      ], data);

      const questionById = new Map(questions.map(q => [q.question_id, q]));
      const sampleRows = samples.filter(s => visibleQuestionIds.has(s.question_id)).map(s => ({...s, ...(questionById.get(s.question_id) || {})}));
      $('sampleCount').textContent = `${sampleRows.length} 条记录`;
      renderTable('sampleTable', [
        { label: '采样ID', key: 'sample_id' },
        { label: '问题ID', key: 'question_id' },
        { label: '轮次', key: 'sample_round', class: 'num' },
        { label: '采样节奏', key: 'sampling_cadence' },
        { label: '关键词', key: 'keyword' },
        { label: '问题类型', render: r => escapeHtml(r.question_type || r.intent || '') },
        { label: '问题', key: 'question_text', class: 'question' },
        { label: '日期', render: r => r.sample_date || '<span class="empty">待采集</span>' },
        { label: '提及蝉妈妈', render: r => pill(r.mentioned_chanmama) },
        { label: '首推', render: r => escapeHtml(r.first_recommendation || '待采集') },
        { label: '蝉妈妈首推', render: r => pill(r.chanmama_is_first) },
        { label: '排名<span class="help">蝉妈妈在推荐中的名次</span>', render: r => escapeHtml(r.chanmama_rank || '未进入'), class: 'num' },
        { label: '前 3', render: r => pill(r.top3_contains_chanmama) },
        { label: '得分<span class="help">首推5，第2名4，第3名3，提及2</span>', render: r => escapeHtml(r.geo_sample_score || ''), class: 'num' },
        { label: '心智分<span class="help">首推100，第二85，第三70</span>', render: r => escapeHtml(r.mind_influence_score || ''), class: 'num' },
        { label: '竞品', render: r => escapeHtml(r.mentioned_competitors || '') },
        { label: '官方工具', render: r => escapeHtml(r.mentioned_official_tools || '') },
        { label: '优势命中', render: r => escapeHtml(r.target_advantages_hit || '') },
        { label: '缺口', render: r => escapeHtml(r.content_gap_type || '') },
        { label: '优化动作', render: r => escapeHtml(r.suggested_action || '') },
        { label: '运营圈引用', render: r => pill(r.mentioned_yunyingquan_source) },
        { label: '引用源', render: r => escapeHtml(r.source_urls || '待采集') }
      ], sampleRows);

      const taskRows = repairList
        .filter(row => visibleQuestionIds.has(row.question_id))
        .map(row => ({...(summaryByQuestionId.get(row.question_id) || {}), ...row}));
      const priorityRows = buildPriorityBoardRows(taskRows);
      $('taskCount').textContent = `${priorityRows.length} 个问题`;
      renderTable('taskTable', [
        { label: '优化ID', render: r => escapeHtml(r.question_id || r.repair_id || r.task_id || ''), class: 'task-id' },
        { label: '优先级', render: priorityCell, class: 'task-priority' },
        { label: '分类 / 关键词', render: topicCell, class: 'task-topic' },
        { label: '爱搜热度', render: heatCell, class: 'num heat-col' },
        { label: '问题', key: 'question_text', class: 'question task-question' },
        { label: '影响样本', render: r => escapeHtml(r.affected_sample_count || '1'), class: 'num impact-col' },
        { label: '排序依据', render: boardEvidence, class: 'gap-col' },
        { label: '优化方向', render: optimizationDirection, class: 'action-col' },
        { label: '补强内容', render: optimizationFocus, class: 'action-col' },
        { label: '交付形式', render: optimizationDeliverable, class: 'action-col' },
        { label: '相关信号', render: signalCell, class: 'signal-col' }
      ], priorityRows);
    }

    function metricHeaders(label) {
      return [
        { label, key: 'name' },
        { label: '问题数', key: 'questions', class: 'num' },
        { label: '采样<span class="help">已采样 / 计划</span>', render: r => `${r.completed}/${r.planned}`, class: 'num' },
        { label: '提及 / 首推', render: r => `${percent(r.mentions, r.completed)} / ${percent(r.firsts, r.completed)}`, class: 'num' },
        { label: '有效首推<span class="help">剔除官方工具首推</span>', render: r => `${r.firsts}/${r.effectiveFirstDenominator}<br>${percent(r.firsts, r.effectiveFirstDenominator)}`, class: 'num' },
        { label: '前3 / 均排', render: r => `${percent(r.top3, r.completed)} / ${rankText(r.rankSum, r.rankCount)}`, class: 'num' },
        { label: '心智分', render: r => r.mindScoreCount ? (r.mindScoreSum / r.mindScoreCount).toFixed(1).replace(/\.0$/, '') : '暂无', class: 'num' },
        { label: '优势表达', render: r => percent(r.advantages, r.completed), class: 'num' },
        { label: '风险<span class="help">竞品 / 官方工具</span>', render: r => `${percent(r.competitors, r.completed)} / ${percent(r.officialTools, r.completed)}`, class: 'num' }
      ];
    }

    function pill(value) {
      if (value === '是') return '<span class="pill ok">是</span>';
      if (value === '否') return '<span class="pill warn">否</span>';
      return '<span class="pill">待采集</span>';
    }

    function bindFilters() {
      optionList($('priorityFilter'), uniq(rows.map(r => r.priority)), '全部优先级');
      optionList($('categoryFilter'), uniq(rows.map(r => r.category)), '全部分类');
      optionList($('keywordFilter'), uniq(rows.map(r => r.keyword)), '全部关键词');
      [
        ['priorityFilter', 'priority'],
        ['categoryFilter', 'category'],
        ['keywordFilter', 'keyword'],
        ['mentionFilter', 'mention']
      ].forEach(([id, key]) => $(id).addEventListener('change', e => { state[key] = e.target.value; render(); }));
      $('searchInput').addEventListener('input', e => { state.search = e.target.value; render(); });
    }

    $('scopeTitle').textContent = window.GEO_DASHBOARD.meta.scope_label || '仪表盘';
    $('sourceUrl').textContent = window.GEO_DASHBOARD.meta.yunyingquan_url;
    $('updatedAt').textContent = window.GEO_DASHBOARD.meta.generated_at;
    bindFilters();
    render();
  </script>
</body>
</html>
